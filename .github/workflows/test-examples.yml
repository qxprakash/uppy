name: Test Examples (Flake Detection)

on:
  workflow_dispatch:
    inputs:
      iterations:
        description: 'Number of times to run the tests'
        required: false
        default: '5'
        type: string

env:
  YARN_ENABLE_GLOBAL_CACHE: false

jobs:
  test_examples:
    name: Example Tests (Run ${{ matrix.run }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        run: [1, 2, 3, 4, 5]
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run:
          echo "dir=$(corepack yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install dependencies
        run: corepack yarn install

      - name: Install Playwright Browsers
        run: corepack yarn workspace @uppy/dashboard playwright install --with-deps

      - name: Build
        run: corepack yarn run build

      - name: Run React example test
        id: react
        continue-on-error: true
        run: corepack yarn workspace example-react test --browser.headless

      - name: Run Vue example test
        id: vue
        continue-on-error: true
        run: corepack yarn workspace example-vue test --browser.headless

      - name: Run SvelteKit example test
        id: svelte
        continue-on-error: true
        run: corepack yarn workspace example-sveltekit test --browser.headless

      - name: Summary
        run: |
          echo "## Run ${{ matrix.run }} Results" >> $GITHUB_STEP_SUMMARY
          echo "| Framework | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| React | ${{ steps.react.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Vue | ${{ steps.vue.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SvelteKit | ${{ steps.svelte.outcome }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any test failed
        if: steps.react.outcome == 'failure' || steps.vue.outcome == 'failure' || steps.svelte.outcome == 'failure'
        run: exit 1
